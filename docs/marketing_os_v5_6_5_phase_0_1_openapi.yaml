x-no-go-api-rules:
  - Do not expose DELETE for ManualPublishEvidence.
  - Do not expose PATCH for ManualPublishEvidence.
  - Do not expose PATCH for approved MediaAssetVersion content.
  - Do not accept workspace_id in request body as trusted source.
  - Do not create PublishJob unless ApprovalDecision is approved and content hash matches.
  - Do not record UsageMeter unless usable_output_confirmed=true.
  - Do not derive customer billing from CostEvent.
  - Do not add endpoints for BillingProvider, ProviderUsageLog, PaidExecution, AutoPublishing, Advanced Attribution, or AI Agents in Phase 0/1.
  - Do not allow cross-workspace reads using entity ID alone.
