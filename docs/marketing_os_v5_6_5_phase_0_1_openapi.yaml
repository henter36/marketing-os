components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    WorkspaceId:
      name: workspaceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Workspace context. Must be authorized and must not be trusted from request body.
    CustomerAccountId:
      name: customerAccountId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MemberId:
      name: memberId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    BrandProfileId:
      name: brandProfileId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CampaignId:
      name: campaignId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MediaJobId:
      name: mediaJobId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MediaAssetId:
      name: mediaAssetId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MediaAssetVersionId:
      name: mediaAssetVersionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ReviewTaskId:
      name: reviewTaskId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ApprovalDecisionId:
      name: approvalDecisionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    PublishJobId:
      name: publishJobId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ManualPublishEvidenceId:
      name: manualPublishEvidenceId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
        minLength: 8
        maxLength: 180
      description: Required for repeatable write operations. Scoped by workspace_id.

  responses:
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorModel'

  schemas:
    ErrorModel:
      type: object
      required: [code, message, user_action, correlation_id]
      properties:
        code:
          type: string
          examples: [TENANT_ACCESS_DENIED, PERMISSION_DENIED, APPROVAL_HASH_MISMATCH, IDEMPOTENCY_CONFLICT]
        message:
          type: string
        user_action:
          type: string
        correlation_id:
          type: string

    PageMeta:
      type: object
      required: [limit, next_cursor]
      properties:
        limit:
          type: integer
        next_cursor:
          type: string
          nullable: true

    EntityBase:
      type: object
      properties:
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
          nullable: true

    Workspace:
      allOf:
        - $ref: '#/components/schemas/EntityBase'
        - type: object
          required: [workspace_id, customer_account_id, workspace_name, workspace_slug, workspace_status]
          properties:
            workspace_id: { type: string, format: uuid }
            customer_account_id: { type: string, format: uuid }
            workspace_name: { type: string }
            workspace_slug: { type: string }
            workspace_status: { type: string, enum: [active, suspended, archived] }
            default_locale: { type: string }
            timezone: { type: string }

    CreateWorkspaceRequest:
      type: object
      required: [customer_account_id, workspace_name, workspace_slug]
      additionalProperties: false
      properties:
        customer_account_id: { type: string, format: uuid }
        workspace_name: { type: string }
        workspace_slug: { type: string }
        default_locale: { type: string, default: en }
        timezone: { type: string, default: UTC }

    UpdateWorkspaceRequest:
      type: object
      additionalProperties: false
      properties:
        workspace_name: { type: string }
        workspace_status: { type: string, enum: [active, suspended, archived] }
        default_locale: { type: string }
        timezone: { type: string }

    WorkspaceResponse:
      type: object
      required: [data]
      properties:
        data: { $ref: '#/components/schemas/Workspace' }

    WorkspaceListResponse:
      type: object
      required: [data, page]
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Workspace' }
        page: { $ref: '#/components/schemas/PageMeta' }

    WorkspaceMember:
      type: object
      required: [workspace_member_id, workspace_id, user_id, role_id, member_status]
      properties:
        workspace_member_id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        role_id: { type: string, format: uuid }
        member_status: { type: string, enum: [invited, active, disabled, removed] }
        joined_at: { type: string, format: date-time, nullable: true }

    InviteWorkspaceMemberRequest:
      type: object
      required: [email, role_id]
      additionalProperties: false
      properties:
        email: { type: string, format: email }
        role_id: { type: string, format: uuid }

    UpdateWorkspaceMemberRequest:
      type: object
      additionalProperties: false
      properties:
        role_id: { type: string, format: uuid }
        member_status: { type: string, enum: [active, disabled, removed] }

    WorkspaceMemberResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/WorkspaceMember' }

    WorkspaceMemberListResponse:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/WorkspaceMember' }
        page: { $ref: '#/components/schemas/PageMeta' }

    Role:
      type: object
      properties:
        role_id: { type: string, format: uuid }
        role_code: { type: string }
        role_name: { type: string }
        role_scope: { type: string, enum: [system, workspace] }

    Permission:
      type: object
      properties:
        permission_id: { type: string, format: uuid }
        permission_code: { type: string }
        permission_name: { type: string }
        domain: { type: string }

    RoleListResponse:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Role' }

    PermissionListResponse:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Permission' }

    CustomerSubscription:
      type: object
      properties:
        customer_subscription_id: { type: string, format: uuid }
        customer_account_id: { type: string, format: uuid }
        subscription_plan_version_id: { type: string, format: uuid }
        subscription_status: { type: string, enum: [trialing, active, past_due, canceled, expired] }
        current_period_start: { type: string, format: date-time }
        current_period_end: { type: string, format: date-time }

    CustomerSubscriptionListResponse:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/CustomerSubscription' }

    BrandProfile:
      type: object
      properties:
        brand_profile_id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        profile_name: { type: string }
        brand_summary: { type: string, nullable: true }
        language: { type: string }
        tone: { type: string, nullable: true }
        brand_status: { type: string, enum: [draft, active, archived] }

    CreateBrandProfileRequest:
      type: object
      required: [profile_name, language]
      additionalProperties: false
      properties:
        profile_name: { type: string }
        brand_summary: { type: string }
        language: { type: string }
        tone: { type: string }

    BrandProfileResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/BrandProfile' }

    BrandProfileListResponse:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/BrandProfile' }
        page: { $ref: '#/components/schemas/PageMeta' }

    BrandVoiceRule:
      type: object
      properties:
        brand_voice_rule_id: { type: string, format: uuid }
        brand_profile_id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        rule_type: { type: string, enum: [tone, banned_claim, required_phrase, style, legal, locale] }
        rule_text: { type: string }
        severity: { type: string, enum: [info, warning, blocker] }
        rule_status: { type: string, enum: [active, disabled] }

    CreateBrandVoiceRuleRequest:
      type: object
      required: [rule_type, rule_text, severity]
      additionalProperties: false
      properties:
        rule_type: { type: string, enum: [tone, banned_claim, required_phrase, style, legal, locale] }
        rule_text: { type: string }
        severity: { type: string, enum: [info, warning, blocker] }

    BrandVoiceRuleResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/BrandVoiceRule' }

    BrandVoiceRuleListResponse:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/BrandVoiceRule' }

    PromptTemplate:
      type: object
      properties:
        prompt_template_id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        template_name: { type: string }
        template_type: { type: string, enum: [caption, ad_copy, image_prompt, video_script, report, reply] }
        template_body: { type: string }
        template_variables: { type: object }
        template_status: { type: string, enum: [draft, active, retired] }
        version_number: { type: integer }

    CreatePromptTemplateRequest:
      type: object
      required: [template_name, template_type, template_body, version_number]
      additionalProperties: false
      properties:
        template_name: { type: string }
        template_type: { type: string, enum: [caption, ad_copy, image_prompt, video_script, report, reply] }
        template_body: { type: string }
        template_variables: { type: object, default: {} }
        version_number: { type: integer, minimum: 1 }

    PromptTemplateResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/PromptTemplate' }

    PromptTemplateListResponse:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/PromptTemplate' }
        page: { $ref: '#/components/schemas/PageMeta' }

    ReportTemplate:
      type: object
      properties:
        report_template_id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        template_name: { type: string }
        template_body: { type: object }
        template_status: { type: string, enum: [draft, active, retired] }

    CreateReportTemplateRequest:
      type: object
      required: [template_name, template_body]
      additionalProperties: false
      properties:
        template_name: { type: string }
        template_body: { type: object }

    ReportTemplateResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/ReportTemplate' }

    ReportTemplateListResponse:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/ReportTemplate' }

    Campaign:
      type: object
      properties:
        campaign_id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        customer_account_id: { type: string, format: uuid }
        campaign_name: { type: string }
        campaign_objective: { type: string }
        campaign_status: { type: string, enum: [draft, active, paused, completed, archived] }

    CreateCampaignRequest:
      type: object
      required: [campaign_name, campaign_objective]
      additionalProperties: false
      properties:
        campaign_name: { type: string }
        campaign_objective: { type: string }

    UpdateCampaignRequest:
      type: object
      additionalProperties: false
      properties:
        campaign_name: { type: string }
        campaign_objective: { type: string }

    CampaignResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/Campaign' }

    CampaignListResponse:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/Campaign' }
        page: { $ref: '#/components/schemas/PageMeta' }

    CampaignStateTransition:
      type: object
      properties:
        campaign_state_transition_id: { type: string, format: uuid }
        campaign_id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        from_status: { type: string, enum: [draft, active, paused, completed, archived], nullable: true }
        to_status: { type: string, enum: [draft, active, paused, completed, archived] }
        reason: { type: string, nullable: true }
        changed_at: { type: string, format: date-time }

    ChangeCampaignStateRequest:
      type: object
      required: [to_status]
      additionalProperties: false
      properties:
        to_status: { type: string, enum: [draft, active, paused, completed, archived] }
        reason: { type: string }

    CampaignStateTransitionResponse:
      type: object
      properties:
        data: { $ref: '#/components/schemas/CampaignStateTransition' }

    CampaignStateTransitionListResponse:
      type: object
      properties:
        data:
          type: array
          items: { $ref: '#/components/schemas/CampaignStateTransition' }

    BriefVersion:
      type: object
      properties:
        brief_version_id: { type: string, format: uuid }
        workspace_id: { type: string, format: uuid }
        campaign_id: { type: string, format: uuid }
        version_number: { type: integer }
        brief_title: { type: string }
        brief_content: { type: object }
