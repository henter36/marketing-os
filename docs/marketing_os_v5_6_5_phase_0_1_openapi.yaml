openapi: 3.1.0
info:
  title: Marketing OS Phase 0/1 API
  version: 5.6.5-phase-0-1
  description: |
    Execution OpenAPI contract derived from the approved Phase 0/1 ERD and PostgreSQL DDL.
    Source authority: Section 52 only.

    This contract is not a full product API. It intentionally excludes paid execution,
    auto-publishing, advanced attribution, AI agents, BillingProvider, ProviderUsageLog,
    and any non-Section-52 relationships.

servers:
  - url: https://api.example.com/v1
    description: Production placeholder
  - url: http://localhost:3000/v1
    description: Local development placeholder

tags:
  - name: Workspaces
  - name: Members
  - name: RBAC
  - name: Subscriptions
  - name: Brand
  - name: Templates
  - name: Campaigns
  - name: Briefs
  - name: Media Jobs
  - name: Assets
  - name: Review
  - name: Approval
  - name: Publish
  - name: Reports
  - name: Usage
  - name: Cost
  - name: Audit
  - name: Operations

security:
  - bearerAuth: []

x-contract-rules:
  source_authority: Section 52 only
  no_code_before_contracts: true
  phase_scope: Phase 0/1 only
  forbidden_entities:
    - GenerationJob
    - Asset
    - Approval
  approved_entity_translation:
    GenerationJob: MediaJob
    Asset: MediaAsset
    Approval: ApprovalDecision
  global_guards:
    - AuthGuard
    - WorkspaceContextGuard
    - MembershipCheck
    - PermissionGuard
  body_workspace_id_trusted: false
  no_go_rules:
    - workspace_id accepted from body as trusted source
    - endpoint reads or writes workspace-scoped record without workspace path/context
    - publish job created without approved ApprovalDecision
    - approved_content_hash differs from MediaAssetVersion.content_hash
    - UsageMeter recorded without usable_output_confirmed=true
    - ManualPublishEvidence PATCH or DELETE exposed
    - approved MediaAssetVersion patched instead of creating a new version
    - frontend starts without this OpenAPI contract

paths:
  /workspaces:
    get:
      tags: [Workspaces]
      summary: List workspaces visible to authenticated user
      operationId: listWorkspaces
      x-permission: workspace.read
      x-audit-event: workspace.listed
      responses:
        '200':
          description: Workspaces returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceListResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Workspaces]
      summary: Create workspace under a customer account
      operationId: createWorkspace
      x-permission: workspace.create
      x-audit-event: workspace.created
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspaceRequest'
      responses:
        '201':
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /workspaces/{workspaceId}:
    parameters:
      - $ref: '#/components/parameters/WorkspaceId'
    get:
      tags: [Workspaces]
      summary: Get workspace
      operationId: getWorkspace
      x-permission: workspace.read
      x-workspace-context: route
      responses:
        '200':
          description: Workspace returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    patch:
      tags: [Workspaces]
      summary: Update workspace mutable fields
      operationId: updateWorkspace
      x-permission: workspace.manage
      x-audit-event: workspace.updated
      x-immutable-fields:
        - workspace_id
        - customer_account_id
        - created_by_user_id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkspaceRequest'
      responses:
        '200':
          description: Workspace updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkspaceResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /workspaces/{workspaceId}/members:
    parameters:
      - $ref: '#/components/parameters/WorkspaceId'
    get:
      tags: [Members]
      summary: List workspace members
      operationId: listWorkspaceMembers
      x-permission: workspace.manage_members
      responses:
        '200':
          description: Members returned
          content:
