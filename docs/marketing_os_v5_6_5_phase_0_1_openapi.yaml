      x-permission: media_job.read
      responses:
        '200':
          description: Media jobs returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaJobListResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Media Jobs]
      summary: Create media job
      operationId: createMediaJob
      x-permission: media_job.create
      x-feature-gate: media_generation
      x-cost-guardrail: required
      x-idempotency-required: true
      x-audit-event: media_job.created
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMediaJobRequest'
      responses:
        '202':
          description: Media job accepted after cost snapshot approval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MediaJobResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /workspaces/{workspaceId}/media-jobs/{mediaJobId}:
